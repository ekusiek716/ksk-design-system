name: CI

# PR と main への push で、型 / lint / 依存方向 / ドリフト / 単体テストを検証する。
# とくに COMPONENT_LOOKUP.md の再生成忘れ（ドリフト）を `npm run check` の
# `generate-component-lookup.mjs --check` で自動検知する。

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: ESLint
        run: npm run lint -- --max-warnings=0

      - name: tsc / lint-scratch / deps / drift / COMPONENT_LOOKUP --check
        run: npm run check

      - name: Unit tests (vitest)
        run: npm test

      - name: Story reuse lint
        run: npm run lint:story-reuse

      - name: Packed package Web consumer install and build
        run: npm run test:consumer:web

      - name: Packed package Native consumer install and typecheck
        run: npm run test:consumer:native

      - name: Packed package Jest 29 consumer render
        run: npm run test:jest-consumer
